name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Compile check
        run: python -m py_compile server.py seed.py db/*.py services/*.py routes/*.py

      - name: Run tests
        run: pytest tests/ -v
