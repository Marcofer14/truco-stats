<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Truco Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <header class="hero">
    <div class="max-w-4xl mx-auto flex items-center gap-4">
      <a href="/" class="text-muted" style="font-size:0.85rem;">&larr; Volver</a>
      <h1 style="font-size:1.3rem;">Panel de administracion</h1>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8 space-y-6">

    <!-- LOGIN -->
    <div id="login-section">
      <div class="card p-6 max-w-sm mx-auto space-y-4">
        <h2 class="text-center">Acceso admin</h2>
        <p class="ornament" style="margin:0;">◆</p>
        <input id="adminPass" class="input" type="password" placeholder="Contrasena" />
        <button onclick="login()" class="btn-gold w-full">Entrar</button>
        <p id="login-error" class="text-crimson text-center hidden italic" style="font-size:0.85rem;">Contrasena incorrecta.</p>
      </div>
    </div>

    <!-- PANEL -->
    <div id="admin-section" class="hidden space-y-6">

      <!-- TABS -->
      <div class="flex gap-1" style="border-bottom: 1px solid var(--gold-faint);">
        <div class="tab active" id="tab-pendientes" onclick="switchAdminTab('pendientes')">Pendientes</div>
        <div class="tab" id="tab-jugadores" onclick="switchAdminTab('jugadores')">Jugadores</div>
      </div>

      <!-- ── PENDIENTES ── -->
      <div id="vista-pendientes" class="space-y-6">
        <div class="flex items-center justify-between">
          <h2>Pendientes de aprobacion</h2>
          <div class="flex gap-2">
            <button onclick="limpiarProcesados()" class="btn-ghost">Limpiar procesados</button>
            <button onclick="cargarPendientes()" class="btn-ghost">Actualizar</button>
          </div>
        </div>

        <div id="pendientes-loading" class="card p-8 text-center text-muted italic">Cargando...</div>
        <div id="pendientes-empty"  class="card p-8 text-center text-muted italic hidden">
          No hay pendientes.
        </div>
        <div id="pendientes-list" class="space-y-6 hidden"></div>
      </div>

      <!-- ── JUGADORES ── -->
      <div id="vista-jugadores" class="hidden space-y-6">
        <div class="flex items-center justify-between">
          <h2>Jugadores</h2>
          <button onclick="cargarJugadores()" class="btn-ghost">Actualizar</button>
        </div>
        <div id="jugadores-loading" class="card p-8 text-center text-muted italic">Cargando...</div>
        <div id="jugadores-list" class="card hidden"></div>
      </div>

    </div>
  </main>

  <!-- MODAL: editar jugador -->
  <div id="modal-editar" class="modal-overlay">
    <div class="modal-card space-y-4">
      <h3 style="margin:0;">Editar jugador</h3>
      <p class="ornament" style="margin:0;">◆</p>
      <div>
        <label class="text-muted italic" style="font-size:0.85rem;">Username</label>
        <input id="edit-username" class="input mt-1" type="text" maxlength="20" />
        <p class="text-muted italic" style="font-size:0.75rem; margin-top:0.25rem;">3-20 caracteres: letras, numeros y "_"</p>
        <p id="edit-username-error" class="text-crimson hidden" style="font-size:0.8rem; margin-top:0.25rem;"></p>
      </div>
      <div>
        <label class="text-muted italic" style="font-size:0.85rem;">Nombre completo</label>
        <input id="edit-nombre" class="input mt-1" type="text" maxlength="60" />
        <p id="edit-nombre-error" class="text-crimson hidden" style="font-size:0.8rem; margin-top:0.25rem;"></p>
      </div>
      <label class="flex items-center gap-2 text-cream" style="font-size:0.9rem;">
        <input id="edit-activo" type="checkbox" /> Activo
      </label>
      <div class="flex gap-3 pt-2">
        <button onclick="cerrarEdicion()" class="btn-ghost flex-1">Cancelar</button>
        <button onclick="guardarEdicion()" class="btn-gold flex-1">Guardar</button>
      </div>
    </div>
  </div>

<script>
let adminPassword = "";
let nombreMap = {};

// ── LOGIN ──
async function login() {
  const pass = document.getElementById("adminPass").value;
  const err  = document.getElementById("login-error");

  const res = await fetch("/api/admin/pendientes", {
    headers: { "x-admin-password": pass }
  });

  if (res.status === 401) {
    err.classList.remove("hidden");
    return;
  }

  adminPassword = pass;
  err.classList.add("hidden");
  document.getElementById("login-section").classList.add("hidden");
  document.getElementById("admin-section").classList.remove("hidden");
  const data = await res.json();
  nombreMap = data.nombreMap || {};
  renderPendientes(data.pendientes || data);
}

document.getElementById("adminPass").addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});

// ── CARGAR PENDIENTES ──
async function cargarPendientes() {
  document.getElementById("pendientes-loading").classList.remove("hidden");
  document.getElementById("pendientes-list").classList.add("hidden");
  document.getElementById("pendientes-empty").classList.add("hidden");

  const res = await fetch("/api/admin/pendientes", {
    headers: { "x-admin-password": adminPassword }
  });
  const data = await res.json();
  nombreMap = data.nombreMap || {};
  renderPendientes(data.pendientes || data);
}

async function limpiarProcesados() {
  if (!confirm("Eliminar todos los pendientes ya aprobados/rechazados?")) return;
  await fetch("/api/admin/pendientes/procesados", {
    method: "DELETE",
    headers: { "x-admin-password": adminPassword }
  });
  cargarPendientes();
}

function renderPendientes(data) {
  document.getElementById("pendientes-loading").classList.add("hidden");

  if (!data || !data.length) {
    document.getElementById("pendientes-empty").classList.remove("hidden");
    return;
  }

  const list = document.getElementById("pendientes-list");
  list.innerHTML = data.map(p => {
    if (p.tipo === "torneo") return renderTarjetaTorneo(p);
    return renderTarjetaSuelto(p);
  }).join("");
  list.classList.remove("hidden");
}

// Helper: resolver display de un slot
function slotNombre(slot) {
  if (!slot) return "?";
  if (typeof slot === "string" && slot.startsWith("NEW:")) {
    const payload = slot.slice(4);
    if (payload.includes("|")) {
      const [u, nc] = payload.split("|");
      return `${u} <span class="text-muted italic" style="font-size:0.78rem;">(${nc}, nuevo)</span>`;
    }
    return `${payload} <span class="text-muted italic" style="font-size:0.78rem;">(nuevo)</span>`;
  }
  const id = typeof slot === "string" ? slot : slot.toString();
  const info = nombreMap[id];
  if (!info) return id.substring(0, 8) + "...";
  if (typeof info === "string") return info;
  return info.username + (info.nombreCompleto && info.nombreCompleto !== info.username
    ? ` <span class="text-muted italic" style="font-size:0.78rem;">(${info.nombreCompleto})</span>`
    : "");
}

function equipoNombre(slots) {
  if (!slots || !slots.length) return "?";
  return slots.map(slotNombre).join(" + ");
}

// ── TARJETA TORNEO ──
function renderTarjetaTorneo(p) {
  const { _id, torneo, partidos, enviadoPor, fechaEnvio } = p;
  const fecha = new Date(fechaEnvio).toLocaleString("es-AR");

  const equiposHtml = torneo.equipos.map((eq) => {
    const nombres = equipoNombre(eq);
    const isGanador = torneo.ganador && torneo.ganador.length > 0 &&
      torneo.ganador.every(g => eq.includes(g));
    return `<div class="${isGanador ? 'text-gold-bright font-semibold' : 'text-cream'}" style="font-size:0.92rem; padding:0.15rem 0;">
      ${isGanador ? '&#x1F3C6; ' : ''}${nombres}
    </div>`;
  }).join("");

  const ganadorNombres = equipoNombre(torneo.ganador || []);

  const partidosHtml = partidos.map((partido) => {
    const eqANombres = equipoNombre(partido.equipoA);
    const eqBNombres = equipoNombre(partido.equipoB);
    const ganadorNombres = partido.equipoGanador
      ? equipoNombre(partido.equipoGanador)
      : (partido.ganador === "A" ? eqANombres : eqBNombres);
    return `<tr style="border-bottom:1px solid rgba(201, 164, 90, 0.08);">
      <td class="py-2 pr-3 text-muted italic" style="font-size:0.85rem;">${partido.ronda}</td>
      <td class="py-2" style="font-size:0.9rem;">${eqANombres} <span class="text-muted italic">vs</span> ${eqBNombres}</td>
      <td class="py-2 text-gold-bright font-semibold pl-3" style="font-size:0.9rem;">Gano: ${ganadorNombres}</td>
    </tr>`;
  }).join("");

  return `
    <div class="card" id="card-${_id}">
      <div class="px-5 py-3 flex items-center justify-between" style="background:rgba(201, 164, 90, 0.06); border-bottom: 1px solid var(--gold-faint);">
        <div class="flex items-center gap-3">
          <span class="badge badge-torneo">Torneo</span>
          <span class="font-serif text-gold-bright" style="font-size:1rem;">${torneo.nombre}</span>
          <span class="text-muted italic" style="font-size:0.8rem;">${torneo.formato} · ${torneo.modalidad}</span>
        </div>
        <div class="text-right text-muted" style="font-size:0.75rem;">
          <p>Enviado por <b class="text-cream">${enviadoPor}</b></p>
          <p class="italic">${fecha}</p>
        </div>
      </div>

      <div class="p-5 space-y-4">
        <div>
          <p class="font-serif text-gold" style="font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase; margin-bottom:0.5rem;">Equipos</p>
          <div style="background:var(--bg-input); padding:0.75rem; border:1px solid var(--gold-faint);">
            ${equiposHtml}
          </div>
        </div>

        <div>
          <p class="font-serif text-gold" style="font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase; margin-bottom:0.4rem;">Ganador del torneo</p>
          <p class="text-gold-bright font-semibold">${ganadorNombres}</p>
        </div>

        <div>
          <p class="font-serif text-gold" style="font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase; margin-bottom:0.4rem;">Partidos (${partidos.length})</p>
          <table class="w-full">
            <tbody>${partidosHtml}</tbody>
          </table>
        </div>

        <div class="flex gap-3 pt-3" style="border-top:1px solid var(--gold-faint);">
          <button onclick="aprobar('${_id}')" class="btn-green flex-1">Aprobar y publicar</button>
          <button onclick="rechazar('${_id}')" class="btn-red flex-1">Rechazar</button>
        </div>
      </div>
    </div>`;
}

// ── TARJETA PARTIDO SUELTO ──
function renderTarjetaSuelto(p) {
  const { _id, enviadoPor, fechaEnvio, fecha, modalidad } = p;
  const fechaEnvioStr = new Date(fechaEnvio).toLocaleString("es-AR");
  const fechaPartido = new Date(fecha).toLocaleDateString("es-AR");

  const eqANombres = equipoNombre(p.equipoA);
  const eqBNombres = equipoNombre(p.equipoB);
  const ganadorNombres = p.equipoGanador
    ? equipoNombre(p.equipoGanador)
    : (p.ganador === "A" ? eqANombres : eqBNombres);

  return `
    <div class="card" id="card-${_id}">
      <div class="px-5 py-3 flex items-center justify-between" style="background:rgba(201, 164, 90, 0.06); border-bottom: 1px solid var(--gold-faint);">
        <div class="flex items-center gap-3">
          <span class="badge badge-suelto">Partido suelto</span>
          <span class="text-muted italic" style="font-size:0.8rem;">${modalidad} · ${fechaPartido}</span>
        </div>
        <div class="text-right text-muted" style="font-size:0.75rem;">
          <p>Enviado por <b class="text-cream">${enviadoPor}</b></p>
          <p class="italic">${fechaEnvioStr}</p>
        </div>
      </div>

      <div class="p-5 space-y-4">
        <div class="grid grid-cols-3 gap-4 text-center items-center">
          <div>
            <p class="font-serif text-gold" style="font-size:0.65rem; letter-spacing:0.16em; text-transform:uppercase; margin-bottom:0.3rem;">Equipo 1</p>
            <p class="text-cream font-semibold" style="font-size:0.95rem;">${eqANombres}</p>
          </div>
          <div>
            <span class="text-muted italic" style="font-size:1.1rem;">vs</span>
          </div>
          <div>
            <p class="font-serif text-gold" style="font-size:0.65rem; letter-spacing:0.16em; text-transform:uppercase; margin-bottom:0.3rem;">Equipo 2</p>
            <p class="text-cream font-semibold" style="font-size:0.95rem;">${eqBNombres}</p>
          </div>
        </div>
        <div class="text-center">
          <p class="font-serif text-gold" style="font-size:0.65rem; letter-spacing:0.16em; text-transform:uppercase; margin-bottom:0.3rem;">Ganador</p>
          <p class="text-gold-bright font-semibold">${ganadorNombres}</p>
        </div>

        <div class="flex gap-3 pt-3" style="border-top:1px solid var(--gold-faint);">
          <button onclick="aprobar('${_id}')" class="btn-green flex-1">Aprobar y publicar</button>
          <button onclick="rechazar('${_id}')" class="btn-red flex-1">Rechazar</button>
        </div>
      </div>
    </div>`;
}

// ── APROBAR ──
async function aprobar(id) {
  if (!confirm("Aprobar? Se calculara el ELO y se publicara en las estadisticas.")) return;

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = "Procesando...";

  const res  = await fetch(`/api/admin/aprobar/${id}`, {
    method:  "POST",
    headers: { "x-admin-password": adminPassword }
  });
  const data = await res.json();

  if (data.ok) {
    document.getElementById(`card-${id}`).remove();
    const restantes = document.querySelectorAll("[id^='card-']").length;
    if (restantes === 0) {
      document.getElementById("pendientes-list").classList.add("hidden");
      document.getElementById("pendientes-empty").classList.remove("hidden");
    }
    alert("Aprobado y publicado.");
  } else {
    alert("Error: " + (data.error ?? "desconocido"));
    btn.disabled = false;
    btn.textContent = "Aprobar y publicar";
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════════════════════════════════
function switchAdminTab(tab) {
  document.getElementById("tab-pendientes").classList.toggle("active", tab === "pendientes");
  document.getElementById("tab-jugadores").classList.toggle("active", tab === "jugadores");
  document.getElementById("vista-pendientes").classList.toggle("hidden", tab !== "pendientes");
  document.getElementById("vista-jugadores").classList.toggle("hidden", tab !== "jugadores");
  if (tab === "jugadores" && !jugadoresCargados) cargarJugadores();
}

// ══════════════════════════════════════════════════════════════════════════════
// JUGADORES
// ══════════════════════════════════════════════════════════════════════════════
const DIVISIONS = [
  { min: 1600, name: "Campeon",  cls: "div-campeon"  },
  { min: 1400, name: "Diamante", cls: "div-diamante" },
  { min: 1200, name: "Oro",      cls: "div-oro"      },
  { min: 1000, name: "Plata",    cls: "div-plata"    },
  { min: 800,  name: "Bronce",   cls: "div-bronce"   },
  { min: 0,    name: "Hierro",   cls: "div-hierro"   },
];
function eloDivision(elo) {
  return DIVISIONS.find(d => elo >= d.min) || DIVISIONS[DIVISIONS.length - 1];
}
function divBadge(elo) {
  const d = eloDivision(elo);
  return `<span class="division-badge ${d.cls}">${d.name}</span>`;
}

let jugadoresAdmin = [];
let jugadoresCargados = false;
let editandoId = null;

async function cargarJugadores() {
  document.getElementById("jugadores-loading").classList.remove("hidden");
  document.getElementById("jugadores-list").classList.add("hidden");

  const res = await fetch("/api/admin/jugadores", {
    headers: { "x-admin-password": adminPassword }
  });
  if (!res.ok) {
    document.getElementById("jugadores-loading").textContent = "Error al cargar.";
    return;
  }
  jugadoresAdmin = await res.json();
  jugadoresCargados = true;
  renderJugadores();
}

function renderJugadores() {
  const cont = document.getElementById("jugadores-list");
  const filas = jugadoresAdmin.map(j => {
    const fec = j.fechaRegistro ? new Date(j.fechaRegistro).toLocaleDateString("es-AR") : "—";
    const inactivo = j.activo === false;
    return `
      <tr ${inactivo ? 'style="opacity:0.5;"' : ''}>
        <td class="font-semibold text-cream">${j.username || '(sin username)'}${divBadge(j.eloActual)}</td>
        <td class="text-muted italic">${j.nombreCompleto || '—'}</td>
        <td class="text-right elo-num">${j.eloActual}</td>
        <td class="text-muted italic" style="font-size:0.78rem;">${fec}</td>
        <td>${inactivo ? '<span class="tag-inactivo">inactivo</span>' : ''}</td>
        <td class="text-right">
          <button onclick="abrirEdicion('${j._id}')" class="btn-ghost" style="padding:0.3rem 0.8rem; font-size:0.65rem;">Editar</button>
        </td>
      </tr>`;
  }).join("");
  cont.innerHTML = `
    <div class="scroll-y lg">
      <table class="classic">
        <thead>
          <tr>
            <th>Username</th>
            <th>Nombre completo</th>
            <th class="text-right">ELO</th>
            <th>Registro</th>
            <th></th>
            <th></th>
          </tr>
        </thead>
        <tbody>${filas}</tbody>
      </table>
    </div>`;
  document.getElementById("jugadores-loading").classList.add("hidden");
  cont.classList.remove("hidden");
}

function abrirEdicion(id) {
  const j = jugadoresAdmin.find(x => x._id === id);
  if (!j) return;
  editandoId = id;
  document.getElementById("edit-username").value = j.username || "";
  document.getElementById("edit-nombre").value = j.nombreCompleto || "";
  document.getElementById("edit-activo").checked = j.activo !== false;
  document.getElementById("edit-username-error").classList.add("hidden");
  document.getElementById("edit-nombre-error").classList.add("hidden");
  document.getElementById("modal-editar").classList.add("open");
}

function cerrarEdicion() {
  document.getElementById("modal-editar").classList.remove("open");
  editandoId = null;
}

async function guardarEdicion() {
  const u = document.getElementById("edit-username").value.trim();
  const n = document.getElementById("edit-nombre").value.trim();
  const activo = document.getElementById("edit-activo").checked;
  const errU = document.getElementById("edit-username-error");
  const errN = document.getElementById("edit-nombre-error");
  errU.classList.add("hidden");
  errN.classList.add("hidden");

  if (!/^[a-zA-Z0-9_]{3,20}$/.test(u)) {
    errU.textContent = "Username invalido (3-20 chars).";
    errU.classList.remove("hidden");
    return;
  }
  if (n.length < 2 || n.length > 60) {
    errN.textContent = "Nombre completo: 2-60 caracteres.";
    errN.classList.remove("hidden");
    return;
  }

  const res = await fetch(`/api/admin/jugadores/${editandoId}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json", "x-admin-password": adminPassword },
    body: JSON.stringify({ username: u, nombreCompleto: n, activo }),
  });
  const data = await res.json();
  if (!res.ok || !data.ok) {
    errU.textContent = data.error || "Error guardando.";
    errU.classList.remove("hidden");
    return;
  }
  cerrarEdicion();
  await cargarJugadores();
}

// ── RECHAZAR ──
async function rechazar(id) {
  if (!confirm("Rechazar este pendiente?")) return;

  await fetch(`/api/admin/rechazar/${id}`, {
    method:  "POST",
    headers: { "x-admin-password": adminPassword }
  });

  document.getElementById(`card-${id}`).remove();
  const restantes = document.querySelectorAll("[id^='card-']").length;
  if (restantes === 0) {
    document.getElementById("pendientes-list").classList.add("hidden");
    document.getElementById("pendientes-empty").classList.remove("hidden");
  }
}
</script>
</body>
</html>
