<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Truco Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <header class="hero">
    <div style="max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 1.25rem;">
      <a href="/" class="btn btn-ghost btn-sm no-underline">&larr; Volver</a>
      <h1 style="font-size: 1.6rem;">Admin</h1>
    </div>
  </header>

  <main style="max-width: 1100px; margin: 0 auto; padding: 1.75rem 1.25rem;">

    <!-- LOGIN -->
    <div id="login-section">
      <div class="card" style="max-width: 380px; margin: 3rem auto 0;">
        <div class="card-header red">Acceso admin</div>
        <div class="card-body padded" style="display:flex; flex-direction:column; gap:0.85rem;">
          <input id="adminPass" class="input" type="password" placeholder="Contrasena" />
          <button onclick="login()" class="btn btn-red" style="width:100%;">Entrar</button>
          <p id="login-error" class="red bold" style="text-align:center; font-size:0.85rem; display:none; margin:0;">Contrasena incorrecta.</p>
        </div>
      </div>
    </div>

    <!-- PANEL -->
    <div id="admin-section" style="display:none;">

      <!-- TABS -->
      <div class="tabs-mod" style="margin-bottom: 1.5rem;">
        <div class="tab-mod active" id="tab-pendientes" onclick="switchAdminTab('pendientes')">Pendientes</div>
        <div class="tab-mod" id="tab-jugadores" onclick="switchAdminTab('jugadores')">Jugadores</div>
      </div>

      <!-- ── PENDIENTES ── -->
      <div id="vista-pendientes">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 1rem; flex-wrap:wrap; gap:0.75rem;">
          <h2>Pendientes de aprobacion</h2>
          <div style="display:flex; gap:0.5rem;">
            <button onclick="limpiarProcesados()" class="btn btn-ghost btn-sm">Limpiar procesados</button>
            <button onclick="cargarPendientes()" class="btn btn-yellow btn-sm">Actualizar</button>
          </div>
        </div>

        <div id="pendientes-loading" class="card card-body padded muted italic" style="text-align:center;">Cargando...</div>
        <div id="pendientes-empty" class="card card-body padded muted italic" style="text-align:center; display:none;">
          No hay pendientes.
        </div>
        <div id="pendientes-list" style="display:none; display:flex; flex-direction:column; gap:1.25rem;"></div>
      </div>

      <!-- ── JUGADORES ── -->
      <div id="vista-jugadores" style="display:none;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 1rem;">
          <h2>Jugadores</h2>
          <button onclick="cargarJugadores()" class="btn btn-yellow btn-sm">Actualizar</button>
        </div>
        <div id="jugadores-loading" class="card card-body padded muted italic" style="text-align:center;">Cargando...</div>
        <div id="jugadores-list" class="card" style="display:none;"></div>
      </div>

    </div>
  </main>

  <!-- MODAL: editar jugador -->
  <div id="modal-editar" class="modal-overlay">
    <div class="modal-card">
      <h2 style="margin-bottom:0.75rem;">Editar jugador</h2>
      <div style="display:flex; flex-direction:column; gap:1rem;">
        <div>
          <label class="field-label">Username</label>
          <input id="edit-username" class="input" type="text" maxlength="20" />
          <p class="muted" style="font-size:0.75rem; margin:0.3rem 0 0 0;">3-20 caracteres: letras, numeros y "_"</p>
          <p id="edit-username-error" class="red bold" style="font-size:0.8rem; margin:0.3rem 0 0 0; display:none;"></p>
        </div>
        <div>
          <label class="field-label">Nombre completo</label>
          <input id="edit-nombre" class="input" type="text" maxlength="60" />
          <p id="edit-nombre-error" class="red bold" style="font-size:0.8rem; margin:0.3rem 0 0 0; display:none;"></p>
        </div>
        <label style="display:flex; align-items:center; gap:0.5rem; font-size:0.92rem;">
          <input id="edit-activo" type="checkbox" /> Activo
        </label>
        <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
          <button onclick="cerrarEdicion()" class="btn btn-ghost" style="flex:1;">Cancelar</button>
          <button onclick="guardarEdicion()" class="btn btn-green" style="flex:1;">Guardar</button>
        </div>
      </div>
    </div>
  </div>

<script>
let adminPassword = "";
let nombreMap = {};

// ── LOGIN ──
async function login() {
  const pass = document.getElementById("adminPass").value;
  const err  = document.getElementById("login-error");

  const res = await fetch("/api/admin/pendientes", {
    headers: { "x-admin-password": pass }
  });

  if (res.status === 401) {
    err.style.display = "block";
    return;
  }

  adminPassword = pass;
  err.style.display = "none";
  document.getElementById("login-section").style.display = "none";
  document.getElementById("admin-section").style.display = "block";
  const data = await res.json();
  nombreMap = data.nombreMap || {};
  renderPendientes(data.pendientes || data);
}

document.getElementById("adminPass").addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});

async function cargarPendientes() {
  document.getElementById("pendientes-loading").style.display = "block";
  document.getElementById("pendientes-list").style.display = "none";
  document.getElementById("pendientes-empty").style.display = "none";

  const res = await fetch("/api/admin/pendientes", {
    headers: { "x-admin-password": adminPassword }
  });
  const data = await res.json();
  nombreMap = data.nombreMap || {};
  renderPendientes(data.pendientes || data);
}

async function limpiarProcesados() {
  if (!confirm("Eliminar todos los pendientes ya aprobados/rechazados?")) return;
  await fetch("/api/admin/pendientes/procesados", {
    method: "DELETE",
    headers: { "x-admin-password": adminPassword }
  });
  cargarPendientes();
}

function renderPendientes(data) {
  document.getElementById("pendientes-loading").style.display = "none";

  if (!data || !data.length) {
    document.getElementById("pendientes-empty").style.display = "block";
    return;
  }

  const list = document.getElementById("pendientes-list");
  list.innerHTML = data.map(p => {
    if (p.tipo === "torneo") return renderTarjetaTorneo(p);
    return renderTarjetaSuelto(p);
  }).join("");
  list.style.display = "flex";
}

function slotNombre(slot) {
  if (!slot) return "?";
  if (typeof slot === "string" && slot.startsWith("NEW:")) {
    const payload = slot.slice(4);
    if (payload.includes("|")) {
      const [u, nc] = payload.split("|");
      return `${u} <span class="muted" style="font-size:0.78rem;">(${nc}, nuevo)</span>`;
    }
    return `${payload} <span class="muted" style="font-size:0.78rem;">(nuevo)</span>`;
  }
  const id = typeof slot === "string" ? slot : slot.toString();
  const info = nombreMap[id];
  if (!info) return id.substring(0, 8) + "...";
  if (typeof info === "string") return info;
  return info.username + (info.nombreCompleto && info.nombreCompleto !== info.username
    ? ` <span class="muted" style="font-size:0.78rem;">(${info.nombreCompleto})</span>`
    : "");
}

function equipoNombre(slots) {
  if (!slots || !slots.length) return "?";
  return slots.map(slotNombre).join(" + ");
}

function renderTarjetaTorneo(p) {
  const { _id, torneo, partidos, enviadoPor, fechaEnvio } = p;
  const fecha = new Date(fechaEnvio).toLocaleString("es-AR");

  const equiposHtml = torneo.equipos.map((eq) => {
    const nombres = equipoNombre(eq);
    const isGanador = torneo.ganador && torneo.ganador.length > 0 &&
      torneo.ganador.every(g => eq.includes(g));
    return `<div class="${isGanador ? 'heavy yellow' : ''}" style="font-size:0.92rem; padding:0.2rem 0;">
      ${isGanador ? '&#x1F3C6; ' : '· '}${nombres}
    </div>`;
  }).join("");

  const ganadorNombres = equipoNombre(torneo.ganador || []);

  const partidosHtml = partidos.map((partido) => {
    const eqANombres = equipoNombre(partido.equipoA);
    const eqBNombres = equipoNombre(partido.equipoB);
    const ganadorNombres = partido.equipoGanador
      ? equipoNombre(partido.equipoGanador)
      : (partido.ganador === "A" ? eqANombres : eqBNombres);
    return `<tr style="border-bottom: 1px solid var(--line-soft);">
      <td class="muted upper" style="font-size:0.7rem; letter-spacing:0.06em; padding: 0.45rem 0.6rem 0.45rem 0;">${partido.ronda}</td>
      <td style="padding: 0.45rem 0.6rem; font-size:0.88rem;">${eqANombres} <span class="muted upper" style="font-size:0.65rem;">vs</span> ${eqBNombres}</td>
      <td class="heavy" style="padding: 0.45rem 0; font-size:0.88rem; color:var(--green);">Gano: ${ganadorNombres}</td>
    </tr>`;
  }).join("");

  return `
    <div class="card" id="card-${_id}">
      <div class="card-header yellow" style="display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
        <div style="display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap;">
          <span class="badge badge-torneo">Torneo</span>
          <span style="font-family:'Archivo Black',sans-serif; font-size:0.9rem;">${torneo.nombre}</span>
          <span style="font-size:0.7rem; opacity:0.85;">${torneo.formato} · ${torneo.modalidad}</span>
        </div>
        <div style="text-align:right; font-size:0.7rem; opacity:0.85;">
          <p style="margin:0;">Enviado por <b>${enviadoPor}</b></p>
          <p style="margin:0;">${fecha}</p>
        </div>
      </div>

      <div class="card-body padded" style="display:flex; flex-direction:column; gap:1rem;">
        <div>
          <p class="upper heavy" style="font-size:0.7rem; letter-spacing:0.08em; margin:0 0 0.5rem 0;">Equipos</p>
          <div style="background: var(--bg-soft); padding: 0.75rem; border: 2px solid var(--black);">
            ${equiposHtml}
          </div>
        </div>

        <div>
          <p class="upper heavy" style="font-size:0.7rem; letter-spacing:0.08em; margin:0 0 0.4rem 0;">Ganador del torneo</p>
          <p class="heavy" style="margin:0; font-size:1.05rem; color:var(--green);">&#x1F3C6; ${ganadorNombres}</p>
        </div>

        <div>
          <p class="upper heavy" style="font-size:0.7rem; letter-spacing:0.08em; margin:0 0 0.4rem 0;">Partidos (${partidos.length})</p>
          <table style="width:100%;">
            <tbody>${partidosHtml}</tbody>
          </table>
        </div>

        <div style="display:flex; gap:0.75rem; padding-top:1rem; border-top: 3px solid var(--black);">
          <button onclick="aprobar('${_id}')" class="btn btn-green" style="flex:1;">Aprobar y publicar</button>
          <button onclick="rechazar('${_id}')" class="btn btn-red" style="flex:1;">Rechazar</button>
        </div>
      </div>
    </div>`;
}

function renderTarjetaSuelto(p) {
  const { _id, enviadoPor, fechaEnvio, fecha, modalidad } = p;
  const fechaEnvioStr = new Date(fechaEnvio).toLocaleString("es-AR");
  const fechaPartido = new Date(fecha).toLocaleDateString("es-AR");

  const eqANombres = equipoNombre(p.equipoA);
  const eqBNombres = equipoNombre(p.equipoB);
  const ganadorNombres = p.equipoGanador
    ? equipoNombre(p.equipoGanador)
    : (p.ganador === "A" ? eqANombres : eqBNombres);

  return `
    <div class="card" id="card-${_id}">
      <div class="card-header" style="display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
        <div style="display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap;">
          <span class="badge badge-suelto">Partido suelto</span>
          <span style="font-size:0.78rem; opacity:0.85;">${modalidad} · ${fechaPartido}</span>
        </div>
        <div style="text-align:right; font-size:0.7rem; opacity:0.85;">
          <p style="margin:0;">Enviado por <b>${enviadoPor}</b></p>
          <p style="margin:0;">${fechaEnvioStr}</p>
        </div>
      </div>

      <div class="card-body padded" style="display:flex; flex-direction:column; gap:1rem;">
        <div style="display:grid; grid-template-columns: 1fr auto 1fr; gap:1rem; align-items:center; text-align:center;">
          <div>
            <p class="upper heavy" style="font-size:0.62rem; letter-spacing:0.08em; margin:0 0 0.3rem 0;">Equipo 1</p>
            <p style="margin:0; font-weight:600;">${eqANombres}</p>
          </div>
          <div class="heavy" style="font-size:1.3rem;">VS</div>
          <div>
            <p class="upper heavy" style="font-size:0.62rem; letter-spacing:0.08em; margin:0 0 0.3rem 0;">Equipo 2</p>
            <p style="margin:0; font-weight:600;">${eqBNombres}</p>
          </div>
        </div>
        <div style="text-align:center; padding-top:0.75rem; border-top:2px solid var(--line-soft);">
          <p class="upper heavy" style="font-size:0.62rem; letter-spacing:0.08em; margin:0 0 0.3rem 0;">Ganador</p>
          <p class="heavy" style="margin:0; font-size:1.05rem; color:var(--green);">&#x1F3C6; ${ganadorNombres}</p>
        </div>

        <div style="display:flex; gap:0.75rem; padding-top:1rem; border-top: 3px solid var(--black);">
          <button onclick="aprobar('${_id}')" class="btn btn-green" style="flex:1;">Aprobar y publicar</button>
          <button onclick="rechazar('${_id}')" class="btn btn-red" style="flex:1;">Rechazar</button>
        </div>
      </div>
    </div>`;
}

async function aprobar(id) {
  if (!confirm("Aprobar? Se calculara el ELO y se publicara en las estadisticas.")) return;

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = "Procesando...";

  const res  = await fetch(`/api/admin/aprobar/${id}`, {
    method:  "POST",
    headers: { "x-admin-password": adminPassword }
  });
  const data = await res.json();

  if (data.ok) {
    document.getElementById(`card-${id}`).remove();
    const restantes = document.querySelectorAll("[id^='card-']").length;
    if (restantes === 0) {
      document.getElementById("pendientes-list").style.display = "none";
      document.getElementById("pendientes-empty").style.display = "block";
    }
    alert("Aprobado y publicado.");
  } else {
    alert("Error: " + (data.error ?? "desconocido"));
    btn.disabled = false;
    btn.textContent = "Aprobar y publicar";
  }
}

async function rechazar(id) {
  if (!confirm("Rechazar este pendiente?")) return;

  await fetch(`/api/admin/rechazar/${id}`, {
    method:  "POST",
    headers: { "x-admin-password": adminPassword }
  });

  document.getElementById(`card-${id}`).remove();
  const restantes = document.querySelectorAll("[id^='card-']").length;
  if (restantes === 0) {
    document.getElementById("pendientes-list").style.display = "none";
    document.getElementById("pendientes-empty").style.display = "block";
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════════════════════════════════
function switchAdminTab(tab) {
  document.getElementById("tab-pendientes").classList.toggle("active", tab === "pendientes");
  document.getElementById("tab-jugadores").classList.toggle("active", tab === "jugadores");
  document.getElementById("vista-pendientes").style.display = tab === "pendientes" ? "" : "none";
  document.getElementById("vista-jugadores").style.display = tab === "jugadores" ? "" : "none";
  if (tab === "jugadores" && !jugadoresCargados) cargarJugadores();
}

// ══════════════════════════════════════════════════════════════════════════════
// JUGADORES
// ══════════════════════════════════════════════════════════════════════════════
const DIVISIONS = [
  { min: 1600, name: "Campeon",  cls: "div-campeon"  },
  { min: 1400, name: "Diamante", cls: "div-diamante" },
  { min: 1200, name: "Oro",      cls: "div-oro"      },
  { min: 1000, name: "Plata",    cls: "div-plata"    },
  { min: 800,  name: "Bronce",   cls: "div-bronce"   },
  { min: 0,    name: "Hierro",   cls: "div-hierro"   },
];
function eloDivision(elo) {
  return DIVISIONS.find(d => elo >= d.min) || DIVISIONS[DIVISIONS.length - 1];
}
function divTag(elo) {
  const d = eloDivision(elo);
  return `<span class="division-tag"><span class="division-dot ${d.cls}"></span>${d.name}</span>`;
}

let jugadoresAdmin = [];
let jugadoresCargados = false;
let editandoId = null;

async function cargarJugadores() {
  document.getElementById("jugadores-loading").style.display = "block";
  document.getElementById("jugadores-list").style.display = "none";

  const res = await fetch("/api/admin/jugadores", {
    headers: { "x-admin-password": adminPassword }
  });
  if (!res.ok) {
    document.getElementById("jugadores-loading").textContent = "Error al cargar.";
    return;
  }
  jugadoresAdmin = await res.json();
  jugadoresCargados = true;
  renderJugadores();
}

function renderJugadores() {
  const cont = document.getElementById("jugadores-list");
  const filas = jugadoresAdmin.map(j => {
    const fec = j.fechaRegistro ? new Date(j.fechaRegistro).toLocaleDateString("es-AR") : "—";
    const inactivo = j.activo === false;
    return `
      <tr ${inactivo ? 'style="opacity:0.5;"' : ''}>
        <td class="cell-name">${j.username || '(sin)'}${divTag(j.eloActual)}</td>
        <td class="muted">${j.nombreCompleto || '—'}</td>
        <td class="num elo-num" style="text-align:right;">${j.eloActual}</td>
        <td class="muted upper" style="font-size:0.68rem; letter-spacing:0.06em;">${fec}</td>
        <td>${inactivo ? '<span class="tag-inactivo">inactivo</span>' : ''}</td>
        <td style="text-align:right;">
          <button onclick="abrirEdicion('${j._id}')" class="btn btn-yellow btn-sm">Editar</button>
        </td>
      </tr>`;
  }).join("");
  cont.innerHTML = `
    <div class="scroll-y lg">
      <table class="classic">
        <thead>
          <tr>
            <th>Username</th>
            <th>Nombre completo</th>
            <th style="text-align:right;">ELO</th>
            <th>Registro</th>
            <th></th>
            <th></th>
          </tr>
        </thead>
        <tbody>${filas}</tbody>
      </table>
    </div>`;
  document.getElementById("jugadores-loading").style.display = "none";
  cont.style.display = "block";
}

function abrirEdicion(id) {
  const j = jugadoresAdmin.find(x => x._id === id);
  if (!j) return;
  editandoId = id;
  document.getElementById("edit-username").value = j.username || "";
  document.getElementById("edit-nombre").value = j.nombreCompleto || "";
  document.getElementById("edit-activo").checked = j.activo !== false;
  document.getElementById("edit-username-error").style.display = "none";
  document.getElementById("edit-nombre-error").style.display = "none";
  document.getElementById("modal-editar").classList.add("open");
}

function cerrarEdicion() {
  document.getElementById("modal-editar").classList.remove("open");
  editandoId = null;
}

async function guardarEdicion() {
  const u = document.getElementById("edit-username").value.trim();
  const n = document.getElementById("edit-nombre").value.trim();
  const activo = document.getElementById("edit-activo").checked;
  const errU = document.getElementById("edit-username-error");
  const errN = document.getElementById("edit-nombre-error");
  errU.style.display = "none";
  errN.style.display = "none";

  if (!/^[a-zA-Z0-9_]{3,20}$/.test(u)) {
    errU.textContent = "Username invalido (3-20 chars).";
    errU.style.display = "block";
    return;
  }
  if (n.length < 2 || n.length > 60) {
    errN.textContent = "Nombre completo: 2-60 caracteres.";
    errN.style.display = "block";
    return;
  }

  const res = await fetch(`/api/admin/jugadores/${editandoId}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json", "x-admin-password": adminPassword },
    body: JSON.stringify({ username: u, nombreCompleto: n, activo }),
  });
  const data = await res.json();
  if (!res.ok || !data.ok) {
    errU.textContent = data.error || "Error guardando.";
    errU.style.display = "block";
    return;
  }
  cerrarEdicion();
  await cargarJugadores();
}

document.getElementById("modal-editar").addEventListener("click", e => {
  if (e.target.id === "modal-editar") cerrarEdicion();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") cerrarEdicion();
});
</script>
</body>
</html>
