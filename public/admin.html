<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Truco Stats</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; }
    .card { background: #1e293b; border: 1px solid #334155; }
    .input { background:#0f172a; border:1px solid #475569; color:#f1f5f9; border-radius:0.5rem; padding:0.5rem 0.75rem; font-size:0.875rem; }
    .input:focus { outline:none; border-color:#f97316; }
    .btn-primary { background:#f97316; color:white; font-weight:600; padding:0.6rem 1.25rem; border-radius:0.5rem; }
    .btn-primary:hover { background:#ea580c; }
    .btn-green { background:#16a34a; color:white; font-weight:600; padding:0.5rem 1rem; border-radius:0.5rem; font-size:0.875rem; }
    .btn-green:hover { background:#15803d; }
    .btn-red { background:#dc2626; color:white; font-weight:600; padding:0.5rem 1rem; border-radius:0.5rem; font-size:0.875rem; }
    .btn-red:hover { background:#b91c1c; }
    .btn-ghost { background:#334155; color:#cbd5e1; font-weight:500; padding:0.5rem 1rem; border-radius:0.5rem; }
    .badge-suelto { background:#6366f122; color:#818cf8; border:1px solid #6366f155; }
    .badge-torneo { background:#f9731622; color:#fb923c; border:1px solid #f9731655; }
  </style>
</head>
<body class="text-slate-100 min-h-screen">

  <header class="border-b border-slate-700 px-6 py-4 flex items-center gap-4">
    <a href="/" class="text-slate-400 hover:text-white transition">&larr; Volver</a>
    <h1 class="text-lg font-bold text-white">Panel de administracion</h1>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8 space-y-6">

    <!-- LOGIN -->
    <div id="login-section">
      <div class="card rounded-xl p-6 max-w-sm mx-auto space-y-4">
        <h2 class="font-bold text-white text-center">Acceso admin</h2>
        <input id="adminPass" class="input w-full" type="password" placeholder="Contrasena" />
        <button onclick="login()" class="btn-primary w-full">Entrar</button>
        <p id="login-error" class="text-red-400 text-sm text-center hidden">Contrasena incorrecta.</p>
      </div>
    </div>

    <!-- PANEL -->
    <div id="admin-section" class="hidden space-y-6">

      <div class="flex items-center justify-between">
        <h2 class="text-lg font-bold text-white">Pendientes de aprobacion</h2>
        <div class="flex gap-2">
          <button onclick="limpiarProcesados()" class="btn-ghost text-sm">Limpiar procesados</button>
          <button onclick="cargarPendientes()" class="btn-ghost text-sm">Actualizar</button>
        </div>
      </div>

      <div id="pendientes-loading" class="card rounded-xl p-8 text-center text-slate-400">Cargando...</div>
      <div id="pendientes-empty"  class="card rounded-xl p-8 text-center text-slate-400 hidden">
        No hay pendientes.
      </div>
      <div id="pendientes-list" class="space-y-6 hidden"></div>

    </div>
  </main>

<script>
let adminPassword = "";
let nombreMap = {};

// ── LOGIN ──
async function login() {
  const pass = document.getElementById("adminPass").value;
  const err  = document.getElementById("login-error");

  const res = await fetch("/api/admin/pendientes", {
    headers: { "x-admin-password": pass }
  });

  if (res.status === 401) {
    err.classList.remove("hidden");
    return;
  }

  adminPassword = pass;
  err.classList.add("hidden");
  document.getElementById("login-section").classList.add("hidden");
  document.getElementById("admin-section").classList.remove("hidden");
  const data = await res.json();
  nombreMap = data.nombreMap || {};
  renderPendientes(data.pendientes || data);
}

document.getElementById("adminPass").addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});

// ── CARGAR PENDIENTES ──
async function cargarPendientes() {
  document.getElementById("pendientes-loading").classList.remove("hidden");
  document.getElementById("pendientes-list").classList.add("hidden");
  document.getElementById("pendientes-empty").classList.add("hidden");

  const res = await fetch("/api/admin/pendientes", {
    headers: { "x-admin-password": adminPassword }
  });
  const data = await res.json();
  nombreMap = data.nombreMap || {};
  renderPendientes(data.pendientes || data);
}

// ── LIMPIAR PROCESADOS ──
async function limpiarProcesados() {
  if (!confirm("Eliminar todos los pendientes ya aprobados/rechazados?")) return;
  await fetch("/api/admin/pendientes/procesados", {
    method: "DELETE",
    headers: { "x-admin-password": adminPassword }
  });
  cargarPendientes();
}

function renderPendientes(data) {
  document.getElementById("pendientes-loading").classList.add("hidden");

  if (!data || !data.length) {
    document.getElementById("pendientes-empty").classList.remove("hidden");
    return;
  }

  const list = document.getElementById("pendientes-list");
  list.innerHTML = data.map(p => {
    if (p.tipo === "torneo") return renderTarjetaTorneo(p);
    return renderTarjetaSuelto(p);
  }).join("");
  list.classList.remove("hidden");
}

// Helper: resolver nombre de un slot (ID o NEW:nombre)
function slotNombre(slot) {
  if (!slot) return "?";
  if (typeof slot === "string" && slot.startsWith("NEW:")) {
    return slot.slice(4) + " (nuevo)";
  }
  const id = typeof slot === "string" ? slot : slot.toString();
  return nombreMap[id] || id.substring(0, 8) + "...";
}

function equipoNombre(slots) {
  if (!slots || !slots.length) return "?";
  return slots.map(slotNombre).join(" + ");
}

// ── TARJETA TORNEO ──
function renderTarjetaTorneo(p) {
  const { _id, torneo, partidos, enviadoPor, fechaEnvio } = p;
  const fecha = new Date(fechaEnvio).toLocaleString("es-AR");

  const equiposHtml = torneo.equipos.map((eq, i) => {
    const nombres = equipoNombre(eq);
    const isGanador = torneo.ganador && torneo.ganador.length > 0 &&
      torneo.ganador.every(g => eq.includes(g));
    return `<div class="${isGanador ? 'text-orange-400 font-bold' : 'text-slate-300'} text-sm">
      ${isGanador ? '&#x1F3C6; ' : ''}${nombres}
    </div>`;
  }).join("");

  const ganadorNombres = equipoNombre(torneo.ganador || []);

  const partidosHtml = partidos.map((partido, i) => {
    const eqANombres = equipoNombre(partido.equipoA);
    const eqBNombres = equipoNombre(partido.equipoB);
    const ganadorNombres = partido.equipoGanador
      ? equipoNombre(partido.equipoGanador)
      : (partido.ganador === "A" ? eqANombres : eqBNombres);
    return `<tr class="border-b border-slate-700/50">
      <td class="py-2 pr-3 text-slate-400 text-sm">${partido.ronda}</td>
      <td class="py-2 text-sm">${eqANombres} <span class="text-slate-600">vs</span> ${eqBNombres}</td>
      <td class="py-2 text-sm text-orange-400 font-semibold pl-3">Gano: ${ganadorNombres}</td>
    </tr>`;
  }).join("");

  return `
    <div class="card rounded-xl overflow-hidden" id="card-${_id}">
      <div class="bg-slate-900 px-5 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-xs font-semibold px-2 py-0.5 rounded-full badge-torneo">Torneo</span>
          <span class="font-bold text-white">${torneo.nombre}</span>
          <span class="text-xs text-slate-400">${torneo.formato} - ${torneo.modalidad}</span>
        </div>
        <div class="text-right text-xs text-slate-500">
          <p>Enviado por <b class="text-slate-300">${enviadoPor}</b></p>
          <p>${fecha}</p>
        </div>
      </div>

      <div class="p-5 space-y-4">
        <div>
          <p class="text-xs text-slate-400 uppercase font-semibold mb-2">Equipos</p>
          <div class="bg-slate-900 rounded-lg p-3 space-y-1">
            ${equiposHtml}
          </div>
        </div>

        <div>
          <p class="text-xs text-slate-400 uppercase font-semibold mb-2">Ganador del torneo</p>
          <p class="text-orange-400 font-bold">${ganadorNombres}</p>
        </div>

        <div>
          <p class="text-xs text-slate-400 uppercase font-semibold mb-2">Partidos (${partidos.length})</p>
          <table class="w-full">
            <tbody>${partidosHtml}</tbody>
          </table>
        </div>

        <div class="flex gap-3 pt-2 border-t border-slate-700">
          <button onclick="aprobar('${_id}')" class="btn-green flex-1">Aprobar y publicar</button>
          <button onclick="rechazar('${_id}')" class="btn-red flex-1">Rechazar</button>
        </div>
      </div>
    </div>`;
}

// ── TARJETA PARTIDO SUELTO ──
function renderTarjetaSuelto(p) {
  const { _id, enviadoPor, fechaEnvio, fecha, modalidad } = p;
  const fechaEnvioStr = new Date(fechaEnvio).toLocaleString("es-AR");
  const fechaPartido = new Date(fecha).toLocaleDateString("es-AR");

  const eqANombres = equipoNombre(p.equipoA);
  const eqBNombres = equipoNombre(p.equipoB);
  const ganadorNombres = p.equipoGanador
    ? equipoNombre(p.equipoGanador)
    : (p.ganador === "A" ? eqANombres : eqBNombres);

  return `
    <div class="card rounded-xl overflow-hidden" id="card-${_id}">
      <div class="bg-slate-900 px-5 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-xs font-semibold px-2 py-0.5 rounded-full badge-suelto">Partido suelto</span>
          <span class="text-xs text-slate-400">${modalidad} - ${fechaPartido}</span>
        </div>
        <div class="text-right text-xs text-slate-500">
          <p>Enviado por <b class="text-slate-300">${enviadoPor}</b></p>
          <p>${fechaEnvioStr}</p>
        </div>
      </div>

      <div class="p-5 space-y-4">
        <div class="grid grid-cols-3 gap-4 text-center">
          <div>
            <p class="text-xs text-slate-400 mb-1">Equipo 1</p>
            <p class="text-sm font-semibold text-slate-200">${eqANombres}</p>
          </div>
          <div class="flex items-center justify-center">
            <span class="text-slate-600 text-lg font-bold">vs</span>
          </div>
          <div>
            <p class="text-xs text-slate-400 mb-1">Equipo 2</p>
            <p class="text-sm font-semibold text-slate-200">${eqBNombres}</p>
          </div>
        </div>
        <div class="text-center">
          <p class="text-xs text-slate-400 mb-1">Ganador</p>
          <p class="text-orange-400 font-bold">${ganadorNombres}</p>
        </div>

        <div class="flex gap-3 pt-2 border-t border-slate-700">
          <button onclick="aprobar('${_id}')" class="btn-green flex-1">Aprobar y publicar</button>
          <button onclick="rechazar('${_id}')" class="btn-red flex-1">Rechazar</button>
        </div>
      </div>
    </div>`;
}

// ── APROBAR ──
async function aprobar(id) {
  if (!confirm("Aprobar? Se calculara el ELO y se publicara en las estadisticas.")) return;

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = "Procesando...";

  const res  = await fetch(`/api/admin/aprobar/${id}`, {
    method:  "POST",
    headers: { "x-admin-password": adminPassword }
  });
  const data = await res.json();

  if (data.ok) {
    document.getElementById(`card-${id}`).remove();
    const restantes = document.querySelectorAll("[id^='card-']").length;
    if (restantes === 0) {
      document.getElementById("pendientes-list").classList.add("hidden");
      document.getElementById("pendientes-empty").classList.remove("hidden");
    }
    alert("Aprobado y publicado.");
  } else {
    alert("Error: " + (data.error ?? "desconocido"));
    btn.disabled = false;
    btn.textContent = "Aprobar y publicar";
  }
}

// ── RECHAZAR ──
async function rechazar(id) {
  if (!confirm("Rechazar este pendiente?")) return;

  await fetch(`/api/admin/rechazar/${id}`, {
    method:  "POST",
    headers: { "x-admin-password": adminPassword }
  });

  document.getElementById(`card-${id}`).remove();
  const restantes = document.querySelectorAll("[id^='card-']").length;
  if (restantes === 0) {
    document.getElementById("pendientes-list").classList.add("hidden");
    document.getElementById("pendientes-empty").classList.remove("hidden");
  }
}
</script>
</body>
</html>
